name: Test dapr-101 track

on:
  schedule:
    - cron: '0 6 * * *'   # Daily 06:00 UTC
  workflow_dispatch:
  pull_request:
    paths:
      - 'dapr-101/**'
      - 'tools/track-tester/**'
      - '.github/workflows/test-dapr-101.yml'

permissions:
  contents: read
  issues: write

jobs:
  docsync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Sync harness
        run: (cd tools/track-tester && uv sync)
      - name: Check doc-sync for all runnable challenges
        run: |
          cd tools/track-tester
          mkdir -p results
          # Check every challenge even if an earlier one drifts, so one report shows
          # all drift (the `if !` guard is exempt from `set -e`, so the loop continues).
          failed=""
          for ch in 2-dapr-cli 3-state-management-api 4-service-invocation-api 5-pubsub-api; do
            if ! uv run python docsync/check_doc_sync.py \
              ../../dapr-101/$ch/assignment.md \
              ../../dapr-101/$ch/tests/challenge.robot; then
              failed="$failed $ch"
            fi
          done
          if [ -n "$failed" ]; then
            # Record for the aggregate issue, then fail the job.
            echo "docsync:$failed" > results/failed-docsync.txt
            echo "::error::doc-sync drift in:$failed"
            exit 1
          fi
      - name: Upload doc-sync failure summary
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: failures-docsync
          path: tools/track-tester/results/failed-docsync.txt
          if-no-files-found: ignore

  agnostic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Setup Dapr sandbox
        run: bash tools/track-tester/ci/setup-dapr-101.sh
      - name: Sync harness
        run: (cd tools/track-tester && uv sync)
      - name: Run challenges 2 and 3
        run: |
          cd tools/track-tester
          mkdir -p results
          # Run both challenges even if the first fails, so a single run reports all
          # failing challenges (the `if !` guard is exempt from `set -e`). ch2 needs the
          # Dapr version variables; ch3 does not, so they run as two explicit steps.
          failed=""
          if ! uv run robot --outputdir results/ch2 \
            --variable "DAPR_VERSION:${DAPR_CLI_VERSION}" \
            --variable "DAPR_RUNTIME_VERSION:${DAPR_RUNTIME_VERSION}" \
            ../../dapr-101/2-dapr-cli/tests/challenge.robot; then
            failed="$failed 2-dapr-cli"
          fi
          if ! uv run robot --outputdir results/ch3 \
            ../../dapr-101/3-state-management-api/tests/challenge.robot; then
            failed="$failed 3-state-management-api"
          fi
          # Merge the per-challenge results into one indexed report (results/report.html +
          # results/log.html) so a single file lists every challenge with its status at a
          # glance. `|| true` because rebot's exit code reflects test failures too.
          uv run rebot --outputdir results --name "dapr-101 (agnostic)" \
            results/ch*/output.xml || true
          if [ -n "$failed" ]; then
            # Record for the aggregate issue, then fail the job.
            echo "agnostic:$failed" > results/failed-agnostic.txt
            echo "::error::Failed challenges (agnostic):$failed"
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: robot-agnostic
          path: tools/track-tester/results/

  languages:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        lang: [dotnet, python, java, javascript]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Set up .NET
        if: matrix.lang == 'dotnet'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
      - name: Set up Java
        if: matrix.lang == 'java'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      # The Java quickstarts are cloned into $HOME/quickstarts at runtime (outside the
      # workspace), so setup-java's built-in `cache: maven` can't find their poms to key on.
      # Cache ~/.m2 explicitly instead. A per-run key with a prefix restore-key means we
      # always restore the newest prior cache and re-save (picking up any new deps) each run.
      - name: Cache Maven repository
        if: matrix.lang == 'java'
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-dapr101-${{ github.run_id }}
          restore-keys: |
            maven-dapr101-
      - name: Set up Node
        if: matrix.lang == 'javascript'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Setup Dapr sandbox
        run: bash tools/track-tester/ci/setup-dapr-101.sh
      - name: Sync harness
        run: (cd tools/track-tester && uv sync)
      # Pre-warm the Maven cache OUTSIDE the harness's timed build step. `mvn clean install`
      # runs under a hard 300s timeout (dapr.resource); on a cold ~/.m2 the dependency
      # download alone can exceed that and the build gets SIGTERM'd mid-download. Fetching
      # dependencies here (untimed) means the timed step only has to compile and test.
      - name: Pre-warm Maven dependencies
        if: matrix.lang == 'java'
        run: |
          QS="${QUICKSTARTS_DIR:-$HOME/quickstarts}"
          for proj in \
            service_invocation/java/http/order-processor \
            service_invocation/java/http/checkout \
            pub_sub/java/sdk/order-processor \
            pub_sub/java/sdk/checkout; do
            echo "::group::go-offline $proj"
            mvn -q -B -f "$QS/$proj/pom.xml" dependency:go-offline
            echo "::endgroup::"
          done
      - name: Run challenges 4 and 5 for ${{ matrix.lang }}
        run: |
          cd tools/track-tester
          mkdir -p results
          # Run every challenge even if an earlier one fails, so a single run reports all
          # failing challenges for this language (the `if !` guard is exempt from `set -e`,
          # so the loop keeps going). Fail the job at the end if any challenge failed.
          failed=""
          for ch in 4-service-invocation-api:ch4 5-pubsub-api:ch5; do
            dir="${ch%%:*}"; out="${ch##*:}"
            if ! uv run robot --outputdir "results/$out" --include ${{ matrix.lang }} \
              "../../dapr-101/$dir/tests/challenge.robot"; then
              failed="$failed $dir"
            fi
          done
          # Merge the per-challenge results into one indexed report (results/report.html +
          # results/log.html) so a single file lists every challenge with its status at a
          # glance. `|| true` because rebot's exit code reflects test failures too.
          uv run rebot --outputdir results --name "dapr-101 (${{ matrix.lang }})" \
            results/ch*/output.xml || true
          if [ -n "$failed" ]; then
            # Record for the aggregate issue, then fail the job.
            echo "${{ matrix.lang }}:$failed" > results/failed-${{ matrix.lang }}.txt
            echo "::error::Failed challenges (${{ matrix.lang }}):$failed"
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: robot-${{ matrix.lang }}
          path: tools/track-tester/results/

  report:
    needs: [docsync, agnostic, languages]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Download failure summaries
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          path: artifacts
      - uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            // Each failing leg wrote a `failed-<leg>.txt` (e.g. "python: 5-pubsub-api")
            // into its artifact; gather them so the issue names the exact failures.
            const lines = [];
            const root = 'artifacts';
            const walk = (dir) => {
              for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
                const p = path.join(dir, entry.name);
                if (entry.isDirectory()) walk(p);
                else if (/^failed-.*\.txt$/.test(entry.name)) {
                  const txt = fs.readFileSync(p, 'utf8').trim();
                  if (txt) lines.push(txt);
                }
              }
            };
            if (fs.existsSync(root)) walk(root);
            lines.sort();
            const details = lines.length
              ? lines.map(l => `  - \`${l}\``).join('\n')
              : '  - (no per-challenge detail captured — check the failing job logs)';
            // Build one `gh run download` line per failing leg that produced a robot
            // report (docsync uploads only a text summary, no report). Each downloads
            // into its own ./report-<leg> folder so multiple reports can co-exist.
            const reportLegs = [...new Set(lines.map(l => l.split(':')[0].trim()))]
              .filter(leg => leg && leg !== 'docsync');
            const downloadCmds = (reportLegs.length ? reportLegs : ['<lang>'])
              .map(leg => `gh run download ${context.runId} -n robot-${leg} -D ./report-${leg}`)
              .join('\n');
            const openLeg = reportLegs.length ? reportLegs[0] : '<lang>';
            const title = 'Dapr 101 track drift detected';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `The dapr-101 drift test **failed**.`,
              ``,
              `**Failing legs (\`leg: challenge …\`):**`,
              details,
              ``,
              `- Run: ${runUrl}`,
              `- For a per-language index, download the \`robot-<lang>\` (or \`robot-agnostic\`) artifact and open \`report.html\` (every challenge listed; failures in red) or \`log.html\`.`,
              ``,
              `Download and open the report(s) for the failing leg(s):`,
              '```bash',
              downloadCmds,
              '```',
              ``,
              `_This issue is updated automatically each run._`,
            ].join('\n');
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: 'drift-report',
            });
            const match = existing.data.find(i => i.title === title);
            if (match) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: match.number, body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels: ['drift-report'],
              });
            }
